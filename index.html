<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zen Kaplumbağa: Sonsuz Ada Bahçesi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #b3e5fc 0%, #e3f2fd 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 100%;
            max-height: 100%;
            border-radius: 18px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.35), rgba(255,255,255,0));
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud-element {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            color: #2e7d32;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #c8e6c9;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }

        .bottom-bar {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 10px;
        }

        #level-indicator {
            font-size: 18px;
            color: #1b5e20;
        }

        #hint-btn,
        #sound-toggle {
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            background: #fff;
        }

        #hint-btn:active,
        #sound-toggle:active {
            transform: scale(0.95);
        }

        #completion-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 10;
        }

        #completion-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(46, 125, 50, 0.15);
            border: 3px solid #a5d6a7;
            transform: translateY(20px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: min(90vw, 460px);
        }

        #completion-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .next-btn {
            background: linear-gradient(135deg, #81c784 0%, #4caf50 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .next-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(76, 175, 80, 0.3);
        }

        @media (max-width: 520px) {
            #ui-layer {
                padding: 12px;
            }

            .hud-element {
                padding: 8px 12px;
                font-size: 13px;
                border-radius: 16px;
            }

            #level-indicator {
                font-size: 14px;
            }

            .modal-content {
                padding: 24px 22px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
            <div id="level-indicator" class="hud-element">🐢 Ada Seviyesi: <span id="lvl-val">1</span></div>
            <div id="sound-toggle" class="hud-element">🎵 Ses: Açık</div>
        </div>

        <div class="bottom-bar">
            <div id="hint-btn" class="hud-element">✨ Akış İpucu</div>
        </div>
    </div>
</div>

<div id="completion-overlay">
    <div class="modal-content">
        <h2>Harika Bir Uyum! 🌸</h2>
        <p>Kaplumbağa adadaki tüm su yollarını birleştirdi, çiçekler açtı!</p>
        <button class="next-btn" id="next-lvl-btn">Sonraki Adaya Yüz 🌊</button>
    </div>
</div>

<script>
/**
 * ZEN TURTLE ISLANDS
 * Düzeltilmiş sürüm:
 * - id hatası düzeltildi.
 * - Harita artık temiz omurga mantığıyla üretiliyor: sadece aktif parçalarda su yolu var.
 * - Başarı şartı: aktif taşların tümü bağlı olacak ve hiçbir su çıkışı boşta kalmayacak.
 * - Canvas tıklama/touch koordinatı CSS ölçeklenmesine karşı düzeltildi.
 * - Hint butonu gerçekten çalışıyor.
 * - Hex yönleri ve kanal çizimleri axial koordinat sistemiyle uyumlu hale getirildi.
 * - Ses butonu adlandırması netleştirildi.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const lvlVal = document.getElementById('lvl-val');
const overlay = document.getElementById('completion-overlay');
const nextBtn = document.getElementById('next-lvl-btn');
const soundToggle = document.getElementById('sound-toggle');
const hintBtn = document.getElementById('hint-btn');

let audioCtx = null;
let soundEnabled = true;

let level = 1;
let hexRadius = 45;
let grid = {};
let particles = [];
let levelCompleted = false;

let turtle = {
    q: 0,
    r: 0,
    x: 0,
    y: 0,
    targetX: 0,
    targetY: 0,
    angle: 0,
    targetAngle: 0,
    animFrame: 0
};

const SQRT_3 = Math.sqrt(3);

// Axial direction order:
// 0: NE, 1: E, 2: SE, 3: SW, 4: W, 5: NW
const DIR_NEIGHBORS = [
    { q: 1, r: -1 },
    { q: 1, r: 0 },
    { q: 0, r: 1 },
    { q: -1, r: 1 },
    { q: -1, r: 0 },
    { q: 0, r: -1 }
];

// Pointy-top hex kanal yönleri.
const DIR_ANGLES = [
    -Math.PI / 3,
    0,
    Math.PI / 3,
    2 * Math.PI / 3,
    Math.PI,
    -2 * Math.PI / 3
];

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playZenSound(type) {
    if (!soundEnabled) return;

    initAudio();
    if (!audioCtx) return;

    const now = audioCtx.currentTime;

    if (type === 'click') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);

        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.12);
    }

    if (type === 'hint') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.exponentialRampToValueAtTime(659.25, now + 0.18);

        gain.gain.setValueAtTime(0.10, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.28);
    }

    if (type === 'success') {
        const freqs = [329.63, 392.00, 440.00, 523.25, 587.33];

        freqs.forEach((f, index) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const startTime = now + index * 0.06;

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, startTime);

            gain.gain.setValueAtTime(0.1, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.6);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(startTime);
            osc.stop(startTime + 0.6);
        });
    }
}

function hexToPixel(q, r) {
    return {
        x: hexRadius * (SQRT_3 * q + SQRT_3 / 2 * r),
        y: hexRadius * (3 / 2 * r)
    };
}

function pixelToHex(x, y) {
    const q = (SQRT_3 / 3 * x - 1 / 3 * y) / hexRadius;
    const r = (2 / 3 * y) / hexRadius;
    return hexRound(q, r);
}

function hexRound(q, r) {
    const s = -q - r;

    let qi = Math.round(q);
    let ri = Math.round(r);
    let si = Math.round(s);

    const qDiff = Math.abs(qi - q);
    const rDiff = Math.abs(ri - r);
    const sDiff = Math.abs(si - s);

    if (qDiff > rDiff && qDiff > sDiff) {
        qi = -ri - si;
    } else if (rDiff > sDiff) {
        ri = -qi - si;
    }

    return { q: qi, r: ri };
}

function tileKey(q, r) {
    return `${q},${r}`;
}

function oppositeDir(dirIndex) {
    return (dirIndex + 3) % 6;
}

function shuffled(array) {
    const copy = [...array];

    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }

    return copy;
}

class Tile {
    constructor(q, r, exits, active = false) {
        this.q = q;
        this.r = r;
        this.exits = exits;
        this.active = active;
        this.endpoint = false;
        this.rotation = 0;
        this.flowerBloomed = false;
        this.flowerScale = 0;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.hintGlow = 0;
    }

    getActualExits() {
        const actual = new Array(6).fill(false);

        if (!this.active) {
            return actual;
        }

        for (let i = 0; i < 6; i++) {
            actual[(i + this.rotation) % 6] = this.exits[i];
        }

        return actual;
    }

    rotate() {
        if (!this.active) return;

        this.rotation = (this.rotation + 1) % 6;
        playZenSound('click');
    }

    isSolvedOrientation() {
        return !this.active || this.rotation === 0;
    }

    degree() {
        return this.exits.filter(Boolean).length;
    }
}

function buildHexCoordinateList(mapRadius) {
    const coords = [];

    for (let q = -mapRadius; q <= mapRadius; q++) {
        const r1 = Math.max(-mapRadius, -q - mapRadius);
        const r2 = Math.min(mapRadius, -q + mapRadius);

        for (let r = r1; r <= r2; r++) {
            coords.push({ q, r });
        }
    }

    return coords;
}

function getDesiredActiveCount(mapRadius) {
    // Tüm adaya su yolu basmıyoruz.
    // Seviye büyüdükçe aktif parça sayısı artıyor ama ekran yine temiz kalıyor.
    if (mapRadius === 2) {
        return Math.min(10 + level, 13);
    }

    return Math.min(14 + level, 24);
}

function getDirectionIndex(from, to) {
    for (let i = 0; i < DIR_NEIGHBORS.length; i++) {
        const dir = DIR_NEIGHBORS[i];

        if (from.q + dir.q === to.q && from.r + dir.r === to.r) {
            return i;
        }
    }

    return -1;
}

function buildSparsePath(coords, desiredLength) {
    const coordSet = new Set(coords.map(({ q, r }) => tileKey(q, r)));
    const start = { q: 0, r: 0 };

    function tryBuildPath() {
        const path = [start];
        const used = new Set([tileKey(start.q, start.r)]);

        function dfs() {
            if (path.length >= desiredLength) {
                return true;
            }

            const current = path[path.length - 1];

            const options = shuffled(DIR_NEIGHBORS.map(dir => ({
                q: current.q + dir.q,
                r: current.r + dir.r
            }))).filter(candidate => {
                const key = tileKey(candidate.q, candidate.r);
                return coordSet.has(key) && !used.has(key);
            });

            for (const next of options) {
                const key = tileKey(next.q, next.r);

                used.add(key);
                path.push(next);

                if (dfs()) {
                    return true;
                }

                path.pop();
                used.delete(key);
            }

            return false;
        }

        return dfs() ? path : null;
    }

    for (let attempt = 0; attempt < 120; attempt++) {
        const path = tryBuildPath();

        if (path) {
            return path;
        }
    }

    // Çok düşük ihtimalde DFS istediğimiz uzunluğu bulamazsa merkezden başlayan güvenli kısa yol.
    return shuffled(coords)
        .filter(({ q, r }) => q !== 0 || r !== 0)
        .slice(0, desiredLength - 1)
        .concat([{ q: 0, r: 0 }])
        .reverse();
}

function createCleanSolvedMap(coords, mapRadius) {
    const exitMap = {};
    const activeKeys = new Set();
    const endpoints = new Set();
    const desiredLength = Math.min(getDesiredActiveCount(mapRadius), coords.length);
    const path = buildSparsePath(coords, desiredLength);

    coords.forEach(({ q, r }) => {
        exitMap[tileKey(q, r)] = new Array(6).fill(false);
    });

    path.forEach(({ q, r }) => {
        activeKeys.add(tileKey(q, r));
    });

    for (let i = 0; i < path.length - 1; i++) {
        const current = path[i];
        const next = path[i + 1];
        const dirIndex = getDirectionIndex(current, next);

        if (dirIndex === -1) continue;

        const currentKey = tileKey(current.q, current.r);
        const nextKey = tileKey(next.q, next.r);

        exitMap[currentKey][dirIndex] = true;
        exitMap[nextKey][oppositeDir(dirIndex)] = true;
    }

    endpoints.add(tileKey(path[0].q, path[0].r));
    endpoints.add(tileKey(path[path.length - 1].q, path[path.length - 1].r));

    return { exitMap, activeKeys, endpoints };
}


function shuffleLevelRotations() {
    const tiles = Object.values(grid).filter(tile => tile.active);

    tiles.forEach(tile => {
        tile.rotation = Math.floor(Math.random() * 6);
    });

    // Başlangıçta yanlışlıkla çözülmüş ya da fazla çözülmüş başlamasın.
    for (let attempt = 0; attempt < 40; attempt++) {
        const connectedCount = calculateConnectedKeys().size;
        const tooEasy = connectedCount > tiles.length * 0.45;
        const allSolved = tiles.every(tile => tile.isSolvedOrientation());

        if (!tooEasy && !allSolved) {
            return;
        }

        tiles.forEach(tile => {
            tile.rotation = Math.floor(Math.random() * 6);
        });
    }

    // Son güvence: merkez dışındaki birkaç aktif taşı boz.
    tiles
        .filter(tile => tile.q !== 0 || tile.r !== 0)
        .slice(0, 4)
        .forEach(tile => {
            tile.rotation = (tile.rotation + 1 + Math.floor(Math.random() * 5)) % 6;
        });
}


function generateLevel() {
    grid = {};
    particles = [];
    levelCompleted = false;
    overlay.classList.remove('active');

    let mapRadius = 2;

    if (level >= 3) {
        mapRadius = 3;
    }

    const coords = buildHexCoordinateList(mapRadius);
    const cleanMap = createCleanSolvedMap(coords, mapRadius);

    coords.forEach(({ q, r }) => {
        const key = tileKey(q, r);
        const active = cleanMap.activeKeys.has(key);

        grid[key] = new Tile(q, r, cleanMap.exitMap[key], active);
        grid[key].endpoint = cleanMap.endpoints.has(key);
    });

    shuffleLevelRotations();

    turtle.q = 0;
    turtle.r = 0;
    turtle.angle = 0;
    turtle.targetAngle = 0;
    syncTurtleToCurrentTile(true);

    checkConnections({ allowCompletion: false });
}


function calculateConnectedKeys() {
    const startKey = '0,0';
    const visited = new Set();

    if (!grid[startKey] || !grid[startKey].active) {
        return visited;
    }

    const queue = [startKey];
    visited.add(startKey);

    while (queue.length > 0) {
        const currentKey = queue.shift();
        const tile = grid[currentKey];

        if (!tile || !tile.active) continue;

        const actualExits = tile.getActualExits();

        for (let i = 0; i < 6; i++) {
            if (!actualExits[i]) continue;

            const dir = DIR_NEIGHBORS[i];
            const nQ = tile.q + dir.q;
            const nR = tile.r + dir.r;
            const neighborKey = tileKey(nQ, nR);
            const neighbor = grid[neighborKey];

            if (!neighbor || !neighbor.active || visited.has(neighborKey)) continue;

            const neighborExits = neighbor.getActualExits();
            const opposite = oppositeDir(i);

            if (neighborExits[opposite]) {
                visited.add(neighborKey);
                queue.push(neighborKey);
            }
        }
    }

    return visited;
}

function isExitMatched(tile, dirIndex) {
    if (!tile || !tile.active) return false;

    const exits = tile.getActualExits();

    if (!exits[dirIndex]) return false;

    const dir = DIR_NEIGHBORS[dirIndex];
    const neighbor = grid[tileKey(tile.q + dir.q, tile.r + dir.r)];

    if (!neighbor || !neighbor.active) return false;

    const neighborExits = neighbor.getActualExits();

    return neighborExits[oppositeDir(dirIndex)] === true;
}

function tileHasAllExitsMatched(tile) {
    if (!tile || !tile.active) return true;

    const exits = tile.getActualExits();

    for (let i = 0; i < 6; i++) {
        if (exits[i] && !isExitMatched(tile, i)) {
            return false;
        }
    }

    return true;
}

function countDanglingExits() {
    let count = 0;

    Object.values(grid).forEach(tile => {
        if (!tile.active) return;

        const exits = tile.getActualExits();

        for (let i = 0; i < 6; i++) {
            if (exits[i] && !isExitMatched(tile, i)) {
                count++;
            }
        }
    });

    return count;
}


function checkConnections({ allowCompletion = true } = {}) {
    const connectedKeys = calculateConnectedKeys();
    const activeTiles = Object.values(grid).filter(tile => tile.active);
    const danglingExitCount = countDanglingExits();
    let fullyValidConnectedCount = 0;

    Object.keys(grid).forEach(key => {
        const tile = grid[key];

        tile.flowerBloomed = tile.active &&
            connectedKeys.has(key) &&
            tileHasAllExitsMatched(tile);

        if (tile.flowerBloomed) {
            fullyValidConnectedCount++;
        }
    });

    if (
        allowCompletion &&
        connectedKeys.size === activeTiles.length &&
        danglingExitCount === 0 &&
        !levelCompleted
    ) {
        levelCompleted = true;
        playZenSound('success');
        createCelebrationParticles();

        setTimeout(() => {
            overlay.classList.add('active');
        }, 900);
    }

    return {
        connectedCount: fullyValidConnectedCount,
        totalTiles: activeTiles.length,
        danglingExitCount
    };
}


function syncTurtleToCurrentTile(instant = false) {
    const pos = hexToPixel(turtle.q, turtle.r);

    turtle.targetX = pos.x;
    turtle.targetY = pos.y;

    if (instant) {
        turtle.x = pos.x;
        turtle.y = pos.y;
    }
}

function moveTurtleTo(q, r) {
    turtle.q = q;
    turtle.r = r;

    const targetPos = hexToPixel(q, r);
    turtle.targetX = targetPos.x;
    turtle.targetY = targetPos.y;
    turtle.targetAngle = Math.atan2(turtle.targetY - turtle.y, turtle.targetX - turtle.x);
}

function createCelebrationParticles() {
    for (let i = 0; i < 70; i++) {
        particles.push({
            x: (Math.random() - 0.5) * canvas.width * 0.45,
            y: (Math.random() - 0.5) * canvas.height * 0.45,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4 - 2,
            radius: Math.random() * 5 + 3,
            color: `hsl(${Math.random() * 60 + 320}, 90%, 75%)`,
            alpha: 1
        });
    }
}

function createHintParticles(tile) {
    const pos = hexToPixel(tile.q, tile.r);

    for (let i = 0; i < 12; i++) {
        particles.push({
            x: pos.x + (Math.random() - 0.5) * hexRadius,
            y: pos.y + (Math.random() - 0.5) * hexRadius,
            vx: (Math.random() - 0.5) * 1.6,
            vy: (Math.random() - 0.5) * 1.6 - 0.5,
            radius: Math.random() * 3 + 2,
            color: 'hsl(48, 95%, 70%)',
            alpha: 0.9
        });
    }
}

function handleInteraction(clientX, clientY) {
    if (levelCompleted) return;

    initAudio();

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    const mouseX = ((clientX - rect.left) * scaleX) - canvas.width / 2;
    const mouseY = ((clientY - rect.top) * scaleY) - canvas.height / 2;

    const clickedHex = pixelToHex(mouseX, mouseY);
    const key = tileKey(clickedHex.q, clickedHex.r);
    const tile = grid[key];

    if (!tile || !tile.active) return;

    tile.rotate();

    checkConnections();

    if (tile.flowerBloomed) {
        moveTurtleTo(clickedHex.q, clickedHex.r);
    }
}


function useHint() {
    if (levelCompleted) return;

    initAudio();

    const candidates = Object.values(grid).filter(tile => tile.active && !tile.isSolvedOrientation());

    if (candidates.length === 0) {
        checkConnections();
        return;
    }

    let bestTile = candidates[0];
    let bestScore = -1;

    candidates.forEach(tile => {
        const oldRotation = tile.rotation;

        tile.rotation = 0;

        const status = checkConnections({ allowCompletion: false });
        const score = status.connectedCount * 10 - status.danglingExitCount;

        tile.rotation = oldRotation;

        if (score > bestScore) {
            bestScore = score;
            bestTile = tile;
        }
    });

    bestTile.rotation = 0;
    bestTile.hintGlow = 1;

    playZenSound('hint');
    createHintParticles(bestTile);
    checkConnections();

    if (bestTile.flowerBloomed) {
        moveTurtleTo(bestTile.q, bestTile.r);
    }
}

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    handleInteraction(e.clientX, e.clientY);
}, { passive: false });

hintBtn.addEventListener('click', () => {
    useHint();
});

soundToggle.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    soundToggle.innerText = soundEnabled ? '🎵 Ses: Açık' : '🔇 Ses: Kapalı';

    if (soundEnabled) {
        playZenSound('hint');
    }
});

nextBtn.addEventListener('click', () => {
    level++;
    lvlVal.innerText = level;
    generateLevel();
});

function resizeCanvas() {
    const size = Math.min(window.innerWidth, window.innerHeight, 800);

    canvas.width = size;
    canvas.height = size;
    canvas.style.width = `${size}px`;
    canvas.style.height = `${size}px`;

    hexRadius = window.innerWidth < 500 ? 34 : 46;

    syncTurtleToCurrentTile(true);
}

window.addEventListener('resize', resizeCanvas);

function drawHexagon(ctx, x, y, radius, tile) {
    ctx.save();
    ctx.translate(x, y);

    tile.pulsePhase += 0.02;

    if (tile.hintGlow > 0) {
        tile.hintGlow -= 0.025;
    }

    const pulse = Math.sin(tile.pulsePhase) * 1.0;
    const glowRadius = radius + pulse + tile.hintGlow * 12;

    if (tile.hintGlow > 0) {
        ctx.beginPath();

        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI / 6;
            const hX = glowRadius * Math.cos(angle);
            const hY = glowRadius * Math.sin(angle);

            if (i === 0) ctx.moveTo(hX, hY);
            else ctx.lineTo(hX, hY);
        }

        ctx.closePath();
        ctx.fillStyle = `rgba(255, 213, 79, ${tile.hintGlow * 0.18})`;
        ctx.fill();
    }

    ctx.beginPath();

    for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const hX = (radius + pulse - 2) * Math.cos(angle);
        const hY = (radius + pulse - 2) * Math.sin(angle);

        if (i === 0) ctx.moveTo(hX, hY);
        else ctx.lineTo(hX, hY);
    }

    ctx.closePath();

    if (!tile.active) {
        ctx.fillStyle = 'rgba(255, 249, 196, 0.42)';
        ctx.strokeStyle = 'rgba(165, 214, 167, 0.28)';
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.restore();
        return;
    }

    ctx.fillStyle = tile.flowerBloomed ? '#e8f5e9' : '#fff9c4';
    ctx.fill();

    ctx.strokeStyle = tile.flowerBloomed ? '#a5d6a7' : '#f0f4c3';
    ctx.lineWidth = 3;
    ctx.stroke();

    const actualExits = tile.getActualExits();
    const channelLength = radius * Math.cos(Math.PI / 6) + 2;

    ctx.lineWidth = 12;
    ctx.lineCap = 'round';

    for (let i = 0; i < 6; i++) {
        if (!actualExits[i]) continue;

        const matched = isExitMatched(tile, i);

        // Kritik düzeltme:
        // Taş bağlı olsa bile eşleşmeyen kolu koyu mavi boyama.
        // Böylece "puzzle bitti ama kenar boşta kaldı" görüntüsü oluşmaz.
        ctx.strokeStyle = tile.flowerBloomed && matched ? '#29b6f6' : '#b3e5fc';

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(
            channelLength * Math.cos(DIR_ANGLES[i]),
            channelLength * Math.sin(DIR_ANGLES[i])
        );
        ctx.stroke();
    }

    if (tile.flowerBloomed) {
        tile.flowerScale = Math.min(1, tile.flowerScale + 0.05);
    } else {
        tile.flowerScale = Math.max(0, tile.flowerScale - 0.05);
    }

    if (tile.flowerScale > 0.01) {
        ctx.save();
        ctx.scale(tile.flowerScale, tile.flowerScale);

        ctx.fillStyle = '#ff80ab';

        for (let j = 0; j < 5; j++) {
            ctx.rotate((Math.PI * 2) / 5);
            ctx.beginPath();
            ctx.ellipse(0, -6, 4, 7, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(0, 0, tile.endpoint ? 5 : 4, 0, Math.PI * 2);
        ctx.fillStyle = tile.endpoint ? '#ffca28' : '#ffd54f';
        ctx.fill();

        ctx.restore();
    }

    ctx.restore();
}


function drawTurtle(ctx) {
    turtle.x += (turtle.targetX - turtle.x) * 0.08;
    turtle.y += (turtle.targetY - turtle.y) * 0.08;

    let angleDiff = turtle.targetAngle - turtle.angle;

    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

    turtle.angle += angleDiff * 0.1;
    turtle.animFrame += 0.05;

    const legWiggle = Math.sin(turtle.animFrame) * 3;

    ctx.save();
    ctx.translate(turtle.x, turtle.y + Math.sin(turtle.animFrame) * 1.2);
    ctx.rotate(turtle.angle + Math.PI / 2);

    ctx.fillStyle = '#81c784';

    ctx.save();
    ctx.translate(-14, -10);
    ctx.rotate(-0.3 + legWiggle * 0.05);
    ctx.fillRect(-4, -12, 7, 14);
    ctx.restore();

    ctx.save();
    ctx.translate(14, -10);
    ctx.rotate(0.3 - legWiggle * 0.05);
    ctx.fillRect(-3, -12, 7, 14);
    ctx.restore();

    ctx.fillRect(-10, 10, 5, 8);
    ctx.fillRect(5, 10, 5, 8);

    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fillStyle = '#4caf50';
    ctx.fill();

    ctx.lineWidth = 2;
    ctx.strokeStyle = '#2e7d32';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, 9, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, -20, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#a5d6a7';
    ctx.fill();

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(-2, -22, 1, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(2, -22, 1, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function updateAndDrawParticles(ctx) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.015;

        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);

    Object.keys(grid).forEach(key => {
        const tile = grid[key];
        const pos = hexToPixel(tile.q, tile.r);
        drawHexagon(ctx, pos.x, pos.y, hexRadius, tile);
    });

    drawTurtle(ctx);
    updateAndDrawParticles(ctx);

    ctx.restore();

    requestAnimationFrame(gameLoop);
}

resizeCanvas();
generateLevel();
gameLoop();
</script>
